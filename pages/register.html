<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ivecome Academy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:wght@300;400;500;700;900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/register.css" />
  </head>
  <body>
    <main>
      <div id="register-parent">
        <div class="register-card">
          <div class="left-side">
            <img src="../assets/images/bg.jpg" alt="" />
          </div>
          <div class="right-side">
            <div class="register-text">
              <h1>
                Welcome, <br />
                Join the Journey
              </h1>
            </div>
            <div class="register-form">
              <form id="register-form" action="">
                <div class="register-form-input">
                  <input
                    id="register-name"
                    type="text"
                    placeholder="Name"
                    required
                  />
                  <input
                    id="register-email"
                    type="email"
                    placeholder="Email"
                    required
                  />
                  <input
                    id="register-password"
                    type="password"
                    placeholder="Password"
                    required
                    minlength="6"
                  />
                  <input
                    id="confirm-pass"
                    type="password"
                    placeholder="Confirm Password"
                    required
                    minlength="6"
                  />
                </div>
                <button class="register-btn" type="submit">Sing Up</button>
              </form>
            </div>
            <p class="to-login">
              Already have an account? <a href="./login.html">Log in</a>
            </p>
          </div>
        </div>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="register.js"></script>
  </body>
</html>

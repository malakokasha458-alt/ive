<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="description" content="Login to your Ivecom Academy account">
    <title>Login | Ivecom Academy</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        .auth-container {
            min-height: calc(100vh - 200px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--bg-white) 100%);
        }
        .auth-card {
            display: flex;
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: var(--shadow-xl);
            max-width: 1000px;
            width: 100%;
        }
        .auth-image {
            flex: 1;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px;
            position: relative;
            overflow: hidden;
        }
        .auth-image::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        .auth-image img {
            width: 100%;
            max-width: 280px;
            position: relative;
            z-index: 1;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .auth-form {
            flex: 1;
            padding: 50px;
        }
        .auth-form h1 {
            font-size: 32px;
            margin-bottom: 10px;
            color: var(--text-dark);
        }
        .auth-form .subtitle {
            color: var(--text-light);
            margin-bottom: 30px;
        }
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
            flex-wrap: wrap;
            gap: 15px;
        }
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-light);
        }
        .remember-me input {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: var(--primary-color);
        }
        .forgot-link {
            color: var(--primary-color);
            font-size: 14px;
            text-decoration: none;
            cursor: pointer;
        }
        .forgot-link:hover {
            text-decoration: underline;
        }
        .auth-footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }
        .auth-footer p {
            color: var(--text-light);
            font-size: 14px;
        }
        .auth-footer a {
            color: var(--primary-color);
            font-weight: 600;
            text-decoration: none;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        @media (max-width: 768px) {
            .auth-card {
                flex-direction: column;
                max-width: 450px;
            }
            .auth-image {
                padding: 40px;
            }
            .auth-image img {
                max-width: 180px;
            }
            .auth-form {
                padding: 30px;
            }
            .auth-form h1 {
                font-size: 28px;
            }
        }
        @media (max-width: 480px) {
            .auth-form {
                padding: 25px;
            }
            .form-options {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

    <!-- Simple Navigation for Auth Pages -->
    <header>
        <nav class="navbar">
            <div class="container navbar-container">
                <div class="logo">
                    <img src="./imges/logiImage.png" alt="Ivecom Academy Logo">
                    <h2>Ivecom Academy</h2>
                </div>
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="about.html">About</a>
                    <a href="cart.html" class="cart-link">Cart</a>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-image">
                    <img src="./imges/bg.jpg" alt="Welcome">
                </div>
                <div class="auth-form">
                    <h1>Welcome Back! 👋</h1>
                    <p class="subtitle">Login to continue your learning journey</p>
                    
                    <form id="login-form">
                        <div class="form-group">
                            <label class="form-label">Email Address</label>
                            <input type="email" id="login-email" class="form-input" placeholder="Enter your email" required autocomplete="email">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <input type="password" id="login-password" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
                        </div>
                        
                        <div class="form-options">
                            <label class="remember-me">
                                <input type="checkbox" id="remember-me">
                                <span>Remember me</span>
                            </label>
                            <a class="forgot-link" id="forgot-password">Forgot Password?</a>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-block" style="width: 100%;">
                            <i class="fas fa-sign-in-alt"></i> Login
                        </button>
                    </form>
                    
                    <div class="auth-footer">
                        <p>Don't have an account? <a href="register.html">Create Account</a></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Simple Footer for Auth Pages -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p class="copyright">&copy; 2026 Ivecom Academy. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/auth.js"></script>
</body>
</html>
